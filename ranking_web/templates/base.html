<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Ranking 管理平台" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="bg-orb bg-orb-a"></div>
<div class="bg-orb bg-orb-b"></div>

<header class="topbar fade-in">
    <div class="brand">
        <div class="brand-badge">RK</div>
        <div>
            <h1>Ranking Ops Platform</h1>
            <p>任务调度 · 股票池更新 · 评分展示</p>
        </div>
    </div>
    <nav class="nav-links">
        <a class="{{ 'active' if request.path == '/' else '' }}" href="{{ url_for('dashboard') }}">总览</a>
        <a class="{{ 'active' if request.path.startswith('/scheduler') else '' }}" href="{{ url_for('scheduler_page') }}">任务调度</a>
        <a class="{{ 'active' if request.path.startswith('/pool') else '' }}" href="{{ url_for('pool_page') }}">股票池维护</a>
        <a class="{{ 'active' if request.path.startswith('/scores') else '' }}" href="{{ url_for('scores_page') }}">评分看板</a>
    </nav>
</header>

<main class="page fade-in-up">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <section class="flash-list">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </section>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
